name: Publish release binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binary-release-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
            asset_arch: amd64
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            asset_arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential gcc-aarch64-linux-gnu

      - name: Install frontend dependencies
        run: npm --prefix ./web ci

      - name: Build frontend
        run: npm --prefix ./web run build

      - name: Build binary package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          package_name="CLIProxyAPIManager_${VERSION}_${GOOS}_${ASSET_ARCH}"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}/data"

          CGO_ENABLED=1 GOOS="${GOOS}" GOARCH="${GOARCH}" CC="${CC}" \
            go build -trimpath -ldflags="-s -w -X CLIProxyAPIManager/internal/version.Version=${VERSION}" -o "${package_dir}/CLIProxyAPIManager" ./cmd/server/main.go
          cp .env.example README.md README.zh.md LICENSE "${package_dir}/"
          cp deploy/linux/CLIProxyAPIManager.service "${package_dir}/"
          tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"

      - name: Upload binary package artifact
        uses: actions/upload-artifact@v6
        with:
          name: CLIProxyAPIManager-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: dist/CLIProxyAPIManager_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.asset_arch }}.tar.gz
          if-no-files-found: error

  binary-release-darwin:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_arch: amd64
            runs_on: macos-15-intel
          - goos: darwin
            goarch: arm64
            asset_arch: arm64
            runs_on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix ./web ci

      - name: Build frontend
        run: npm --prefix ./web run build

      - name: Build binary package
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          package_name="CLIProxyAPIManager_${VERSION}_${GOOS}_${ASSET_ARCH}"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}/data"

          CGO_ENABLED=1 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags="-s -w -X CLIProxyAPIManager/internal/version.Version=${VERSION}" -o "${package_dir}/CLIProxyAPIManager" ./cmd/server/main.go
          cp .env.example README.md README.zh.md LICENSE "${package_dir}/"
          tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"

      - name: Upload binary package artifact
        uses: actions/upload-artifact@v6
        with:
          name: CLIProxyAPIManager-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: dist/CLIProxyAPIManager_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.asset_arch }}.tar.gz
          if-no-files-found: error

  binary-release-windows:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            asset_arch: amd64
            runs_on: windows-2025
            msystem: UCRT64
            install: mingw-w64-ucrt-x86_64-gcc
            cc: gcc
          - goarch: arm64
            asset_arch: arm64
            runs_on: windows-11-arm
            msystem: CLANGARM64
            install: mingw-w64-clang-aarch64-gcc
            cc: gcc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          path-type: inherit
          install: ${{ matrix.install }}

      - name: Install frontend dependencies
        shell: bash
        run: npm --prefix ./web ci

      - name: Build frontend
        shell: bash
        run: npm --prefix ./web run build

      - name: Build binary package
        shell: msys2 {0}
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          CC: ${{ matrix.cc }}
        run: |
          set -euo pipefail
          package_name="CLIProxyAPIManager_${VERSION}_${GOOS}_${ASSET_ARCH}"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}/data"

          CGO_ENABLED=1 GOOS="${GOOS}" GOARCH="${GOARCH}" CC="${CC}" \
            go build -trimpath -ldflags="-s -w -X CLIProxyAPIManager/internal/version.Version=${VERSION}" -o "${package_dir}/CLIProxyAPIManager.exe" ./cmd/server/main.go
          cp .env.example README.md README.zh.md LICENSE "${package_dir}/"

      - name: Archive binary package
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          $packageName = "CLIProxyAPIManager_${env:VERSION}_windows_${env:ASSET_ARCH}"
          Compress-Archive -Path "dist/$packageName" -DestinationPath "dist/$packageName.zip"

      - name: Upload binary package artifact
        uses: actions/upload-artifact@v6
        with:
          name: CLIProxyAPIManager-${{ github.ref_name }}-windows-${{ matrix.asset_arch }}
          path: dist/CLIProxyAPIManager_${{ github.ref_name }}_windows_${{ matrix.asset_arch }}.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-24.04
    needs:
      - binary-release-linux
      - binary-release-darwin
      - binary-release-windows
    steps:
      - name: Download binary package artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  update-homebrew-tap:
    runs-on: ubuntu-24.04
    needs: publish-release
    steps:
      - name: Download binary package artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula values
        id: formula
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

          arm_file="CLIProxyAPIManager_${tag}_darwin_arm64.tar.gz"
          amd_file="CLIProxyAPIManager_${tag}_darwin_amd64.tar.gz"
          arm_sha="$(awk -v f="${arm_file}" '$2 == f {print $1}' checksums.txt)"
          amd_sha="$(awk -v f="${amd_file}" '$2 == f {print $1}' checksums.txt)"

          test -n "${arm_sha}"
          test -n "${amd_sha}"

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "arm_file=${arm_file}"
            echo "amd_file=${amd_file}"
            echo "arm_sha=${arm_sha}"
            echo "amd_sha=${amd_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: a389216533/homebrew-CLIProxyAPIManager
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        env:
          TAG: ${{ steps.formula.outputs.tag }}
          VERSION: ${{ steps.formula.outputs.version }}
          ARM_FILE: ${{ steps.formula.outputs.arm_file }}
          AMD_FILE: ${{ steps.formula.outputs.amd_file }}
          ARM_SHA: ${{ steps.formula.outputs.arm_sha }}
          AMD_SHA: ${{ steps.formula.outputs.amd_sha }}
        run: |
          set -euo pipefail
          mkdir -p homebrew-tap/Formula

          cat > homebrew-tap/Formula/CLIProxyAPIManager.rb <<EOF
          class CLIProxyAPIManager < Formula
            desc "Standalone CPA usage persistence and dashboard service"
            homepage "https://github.com/a389216533/CLIProxyAPIManager"
            license "MIT"
            version "${VERSION}"

            depends_on :macos

            on_macos do
              on_arm do
                url "https://github.com/a389216533/CLIProxyAPIManager/releases/download/${TAG}/${ARM_FILE}"
                sha256 "${ARM_SHA}"
              end

              on_intel do
                url "https://github.com/a389216533/CLIProxyAPIManager/releases/download/${TAG}/${AMD_FILE}"
                sha256 "${AMD_SHA}"
              end
            end

            def install
              inreplace ".env.example", "WORK_DIR=./data", "WORK_DIR=#{var}/CLIProxyAPIManager"

              bin.install "CLIProxyAPIManager"
              etc.install ".env.example" => "CLIProxyAPIManager.env.example"
              pkgshare.install "README.md", "README.zh.md", "LICENSE"
            end

            def post_install
              (var/"CLIProxyAPIManager").mkpath

              env_file = etc/"CLIProxyAPIManager.env"
              cp etc/"CLIProxyAPIManager.env.example", env_file unless env_file.exist?
            end

            service do
              run [opt_bin/"CLIProxyAPIManager", "--env", etc/"CLIProxyAPIManager.env"]
              working_dir var/"CLIProxyAPIManager"
              keep_alive true
              log_path var/"log/CLIProxyAPIManager.log"
              error_log_path var/"log/CLIProxyAPIManager.err.log"
            end

            def caveats
              <<~EOS
                Edit the configuration before starting the service:

                  #{etc}/CLIProxyAPIManager.env

                Required values include CPA_BASE_URL and CPA_MANAGEMENT_KEY.

                Start the service with:

                  brew services start CLIProxyAPIManager
              EOS
            end

            test do
              assert_match "Usage of", shell_output("#{bin}/CLIProxyAPIManager --help 2>&1")
            end
          end
          EOF

      - name: Commit and push tap update
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/CLIProxyAPIManager.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date"
            exit 0
          fi

          git commit -m "Update CLIProxyAPIManager to ${GITHUB_REF_NAME}"
          git push
